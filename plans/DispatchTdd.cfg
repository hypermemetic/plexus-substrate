SPECIFICATION Spec

CONSTANTS
    MaxRepairCycles = 2
    MaxSpecCycles   = 2
    Null = "Null"

\* State predicates — checked at every state
INVARIANTS
    TypeOK
    BranchingRequiresValidContract
    ValidationRequiresBothBranches
    ImpossibleRoutesToHuman
    RepairCycleInBounds
    SpecCycleInBounds
    ContractPresentDuringWork

\* Temporal properties — checked over full execution traces
PROPERTIES
    NoBranchingBeforeValidContract
    NoValidationBeforeBothBranches
    ImpossibleAlwaysEscalates
    RepairCycleMonotone
    SpecCycleMonotone
    CompleteIsTerminal
    FailedIsTerminal
    EventualTermination
    HumanGateResolves
    ValidPassLeadsToComplete
