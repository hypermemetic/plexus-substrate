SPECIFICATION Spec

\* Degraded: crashed nodes are abandoned (Failed), but failure propagation
\* clears the downstream Pending deadlock.  Graph terminates with more Faileds.
CONSTANTS
    UseRecovery        = TRUE
    UseReinit          = FALSE
    UseFailPropagation = TRUE

INVARIANTS
    TypeOK
    AgentConsistency
    InterruptedHasNoAgent
    NoAgentsWhileDown
    DepsRespected

PROPERTIES
    EventualCompletion
    EachNodeTerminates
