SPECIFICATION Spec

\* Optimal: crashed nodes are re-dispatched, graph eventually completes.
CONSTANTS
    UseRecovery        = TRUE
    UseReinit          = TRUE
    UseFailPropagation = TRUE

INVARIANTS
    TypeOK
    AgentConsistency
    InterruptedHasNoAgent
    NoAgentsWhileDown
    DepsRespected

PROPERTIES
    EventualCompletion
    EachNodeTerminates
